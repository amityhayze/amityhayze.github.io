<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Amity Hayze — Press + Features</title>

  <meta name="description" content="Amity Hayze — Press & features. Articles, playlists, and places that included Amity's transmissions.">
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <style>
    :root {
      --neon: #ff6bcd;
      --bg-dark: #000;
      --panel: rgba(0,0,0,0.7);
      --muted: #eab2d5;
      --wrap-max: 980px;
      --hazy-pink: rgba(255,107,205,0.25);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg-dark);
      font-family: "Courier New", monospace;
      color: var(--neon);
    }

    body { padding-top: 62px; }

    /* Background */
    body::before {
      content:"";
      position:fixed;
      inset:0;
      background:url('https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif') center/cover no-repeat;
      opacity:0.12;
      z-index:-2;
      mix-blend-mode:screen;
    }

    body::after {
      content:"";
      position:fixed;
      inset:0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 70%);
      z-index:-1;
    }

    /* NAV */
    .main-nav {
      position:fixed;
      top:0; left:0; right:0;
      background:rgba(0,0,0,0.65);
      border-bottom:1px solid rgba(255,107,205,0.08);
      display:flex;
      justify-content:center;
      gap:32px;
      padding:12px;
      z-index:1000;
    }

    .main-nav a {
      color:var(--neon);
      text-decoration:none;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:1px;
      transition:0.2s;
    }

    .main-nav a:hover,
    .main-nav a.active {
      text-shadow:0 0 10px var(--neon);
    }

    /* LAYOUT */
    .wrap {
      max-width:var(--wrap-max);
      margin:8vh auto;
      padding:30px;
    }

    .panel {
      background:var(--panel);
      border:1px solid rgba(255,107,205,0.06);
      border-radius:12px;
      padding:28px;
      margin-bottom:28px;
    }

    header {
      text-align:center;
      margin-bottom:18px;
    }

    .title {
      font-size:34px;
      text-shadow:0 0 10px rgba(255,107,205,0.2);
    }

    .subtitle {
      font-size:13px;
      color:var(--muted);
    }

    /* BUTTON */
    .btn {
      display:inline-block;
      padding:12px 22px;
      border-radius:10px;
      border:1px solid rgba(255,107,205,0.18);
      color:var(--neon);
      text-decoration:none;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1px;
      transition:0.2s;
    }

    .btn:hover {
      background:var(--neon);
      color:#000;
      box-shadow:0 0 20px var(--neon);
    }

    /* FILTER */
    input, select {
      padding:8px;
      border-radius:8px;
      border:1px solid rgba(255,107,205,0.1);
      background:rgba(255,255,255,0.03);
      color:var(--neon);
    }

    /* FEATURE CARD */
    .press-card {
      max-width:560px;
      margin:auto;
      background:rgba(0,0,0,0.5);
      padding:12px;
      border-radius:10px;
    }

    /* PLAYLIST */
    .player {
      width:100%;
      height:360px;
      border:0;
      border-radius:8px;
    }

    /* ARCHIVE */
    .archive-item {
      display:flex;
      justify-content:space-between;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
      border:1px solid rgba(255,107,205,0.05);
    }

    .small-link {
      color:var(--neon);
      text-decoration:none;
    }

    /* wiki dot */
    .wiki-dot {
      position: fixed;
      right: 14px;
      bottom: 12px;
      color: rgba(255,107,205,0.2);
      border: none;
      background: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav class="main-nav">
  <a href="index.html">Home</a>
  <a href="music.html">Music</a>
  <a href="visuals.html">Visuals</a>
  <a href="press.html" class="active">Press</a>
</nav>

<div class="wrap">

<header>
  <h1 class="title">Press + Features</h1>
  <p class="subtitle">A curated archive of articles, playlists, and features.</p>
</header>

<section class="panel">
  <div style="text-align:center;">
    <a class="btn" href="index.html">Back</a>
    <a class="btn" href="https://open.spotify.com/artist/5NMNo5sQFABJdY3jHH53wf" target="_blank">Listen</a>
  </div>
</section>

<!-- FEATURE -->
<section class="panel">
  <h3 style="text-align:center;">Featured Highlight</h3>

  <div class="press-card">
    <blockquote class="instagram-media"
      data-instgrm-permalink="https://www.instagram.com/p/DTQcumeDL-j/">
    </blockquote>
  </div>

  <p style="text-align:center;font-size:12px;">Amuse — Instagram Feature</p>
</section>

<!-- PLAYLIST -->
<section class="panel">
  <h3>Playlists</h3>

  <iframe class="player" src="https://open.spotify.com/embed/playlist/08i9sjghPv0YOJgvwrGypr" loading="lazy"></iframe>
  <iframe class="player" src="https://open.spotify.com/embed/playlist/4vi0drYKDFsH2RDNKxRhvn" loading="lazy"></iframe>
</section>

<!-- ARCHIVE -->
<section class="panel">
  <h3>Press Archive</h3>

  <input id="search" placeholder="Search..." />

  <div id="archive">

    <div class="archive-item" data-type="article">
      <span>Oct 2025 — Indie E Music</span>
      <a class="small-link" href="https://indieemusic.com/amity-hayze-strikes-emotional-chords-with-how-could-you-love-me/" target="_blank">Read</a>
    </div>

    <div class="archive-item" data-type="article">
      <span>Bored City Blog</span>
      <a class="small-link" href="https://boredcity.co/amity-hayze-drunk-on-expectations/" target="_blank">Read</a>
    </div>

  </div>
</section>

<footer style="text-align:center;">
  © Amity Hayze — transmissions & static
</footer>

</div>

<button class="wiki-dot" onclick="window.location.href='wiki-unlock.html'">▦</button>

<script src="https://www.instagram.com/embed.js"></script>

<script>
/* Instagram safe load */
window.addEventListener('load', () => {
  if (window.instgrm) window.instgrm.Embeds.process();
});

/* Search filter */
const search = document.getElementById('search');
const items = document.querySelectorAll('.archive-item');

search.addEventListener('input', () => {
  const val = search.value.toLowerCase();

  items.forEach(item => {
    item.style.display =
      item.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
  });
});
</script>

</body>
</html>
